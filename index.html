<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SBU2 Amazing</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe6f0, #ffd6eb);
  color: #d63384;
  overflow-x: hidden;
  min-height: 100vh;
  min-height: 100dvh;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 20px;
}

h1 {
  font-size: clamp(28px, 7vw, 48px);
  color: #d63384;
  animation: glow 1.5s infinite alternate;
  margin: 0 0 10px;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 30px #ff2f92; }
}

#money {
  font-size: clamp(48px, 15vw, 90px);
  margin: 20px 0;
  font-weight: bold;
}

#headphoneHint {
  font-size: clamp(13px, 3.5vw, 16px);
  color: #d63384;
  margin: 0 0 15px;
}

button {
  width: clamp(100px, 28vw, 140px);
  height: clamp(100px, 28vw, 140px);
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: radial-gradient(circle, #ff4da6, #d63384);
  color: white;
  font-size: clamp(16px, 4.5vw, 22px);
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(214,51,132,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 15px 35px rgba(214,51,132,0.6);
}

button:active {
  transform: scale(0.95);
}

button:disabled {
  background: #ccc;
  box-shadow: none;
  cursor: not-allowed;
}

.shake {
  animation: shake 0.8s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-8px,4px); }
  50% { transform: translate(8px,-4px); }
  75% { transform: translate(-8px,4px); }
  100% { transform: translate(0,0); }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 10;
}

.rose {
  position: fixed;
  font-size: clamp(24px, 8vw, 40px);
  animation: float 8s linear infinite;
  opacity: 0.8;
  z-index: 5;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

.poem {
  margin: 25px auto 0;
  font-size: clamp(15px, 4vw, 20px);
  line-height: 1.8;
  display: none;
  color: #6a0572;
  font-weight: 600;
  max-width: 500px;
  padding: 0 10px;
}

#giftLink {
  display: none;
  margin-top: 20px;
  padding: 12px 28px;
  background: linear-gradient(135deg, #ff9a00, #ff6f00);
  color: #fff;
  font-size: clamp(14px, 4vw, 18px);
  font-weight: bold;
  border: none;
  border-radius: 30px;
  text-decoration: none;
  box-shadow: 0 6px 20px rgba(255,111,0,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}

#giftLink:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 25px rgba(255,111,0,0.6);
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="container">
  <h1>🌸 SBU2 Amazing 🌸</h1>
  <div id="money">0円</div>
  <p id="headphoneHint">🎧 Đeo tai nghe để trải nghiệm tốt nhất!</p>
  <button id="spinBtn" onclick="startSpin()">🎵<br>SPIN</button>

  <button id="musicBtn" onclick="toggleMusic()" style="display:none; width:50px; height:50px; font-size:22px; margin-top:15px; padding:0;">⏸️</button>

  <div class="poem" id="poem"></div>
  <a id="giftLink" href="#" target="_blank">🎁 Nhận quà tại đây</a>
</div>

<script>
const USERS = {
  diep: {
    name: "Diệp",
    amount: 3000,
    music: "diep.mp3",
    giftLink: "https://www.amazon.co.jp/dp/XXXXX",
    poem: `🌹<br>
    Diệp cười rạng rỡ lung linh,<br>
    Chủ nhật mùng tám, tâm tình thêm vui.<br>
    Tám ba chúc Diệp xinh tươi,<br>
    Sếp không giao việc, thảnh thơi cả ngày!`
  },
  thu: {
    name: "Thư",
    amount: 3000,
    music: "thu.mp3",
    giftLink: "https://www.amazon.co.jp/dp/XXXXX",
    poem: `🌹<br>
    Thư làm chẳng thấy kêu ca,<br>
    Deadline dí tới vẫn cười HAHA.<br>
    Ngày tám tháng ba thật gần,<br>
    Chúc Thư luôn đẹp, luôn xuân trong lòng.`
  },
  thanh: {
    name: "Thanh",
    amount: 3000,
    music: "thanh.mp3",
    giftLink: "https://www.amazon.co.jp/dp/XXXXX",
    poem: `🌹<br>
    Thanh như gió mát đầu ngày,<br>
    Mang theo vui vẻ đong đầy quanh ta.<br>
    Mùng tám tháng ba đến nha,<br>
    Chúc Thanh rạng rỡ như hoa giữa trời.`
  }
};

const params = new URLSearchParams(window.location.search);
const userKey = (params.get("user") || "").toLowerCase();
const userData = USERS[userKey];

if (!userData) {
  document.querySelector(".container").innerHTML =
    "<h1>🌸 SBU2 Amazing 🌸</h1><p style='font-size:clamp(16px,4vw,24px)'>Không tìm thấy người nhận.<br>Vui lòng kiểm tra lại link.</p>";
}

const FINAL_AMOUNT = userData ? userData.amount : 0;
const MAX_AMOUNT = 10000;

const btn = document.getElementById("spinBtn");
const display = document.getElementById("money");
const poemEl = document.getElementById("poem");

const giftLinkEl = document.getElementById("giftLink");

if (userData) {
  poemEl.innerHTML = userData.poem;
  if (userData.giftLink) giftLinkEl.href = userData.giftLink;
  const storageKey = "gift_used_" + userKey;

  if (localStorage.getItem(storageKey)) {
    btn.disabled = true;
    display.innerText = FINAL_AMOUNT.toLocaleString() + "円";
    poemEl.style.display = "block";
    if (userData.giftLink) giftLinkEl.style.display = "inline-block";
  }
}

let audio = null;

function startSpin() {
  btn.disabled = true;
  const storageKey = "gift_used_" + userKey;
  localStorage.setItem(storageKey, "true");

  if (userData && userData.music) {
    audio = new Audio(userData.music);
    audio.play().catch(() => {});
    document.getElementById("musicBtn").style.display = "inline-block";
    audio.addEventListener("ended", () => {
      document.getElementById("musicBtn").style.display = "none";
    });
  }

  let current = 0;

  const up = setInterval(() => {
    current += Math.floor(Math.random() * 900) + 400;
    if (current >= MAX_AMOUNT) {
       clearInterval(up);
       setTimeout(randomFinalPhase, 1000);
    }
    display.innerText = Math.min(current, MAX_AMOUNT).toLocaleString() + "円";
  }, 100);
}

function toggleMusic() {
  if (!audio) return;
  const btn = document.getElementById("musicBtn");
  if (audio.paused) {
    audio.play();
    btn.textContent = "⏸️";
  } else {
    audio.pause();
    btn.textContent = "▶️";
  }
}

function randomFinalPhase() {
  let duration = 5000;
  let start = Date.now();

  const chaos = setInterval(() => {
    let randomValue = Math.floor(Math.random() * 9000) + 1000;
    display.innerText = randomValue.toLocaleString() + "円";

    if (Date.now() - start > duration) {
      clearInterval(chaos);
      finish();
    }
  }, 80);
}

function finish() {
  display.innerText = FINAL_AMOUNT.toLocaleString() + "円";
  display.style.color = "#d63384";
  display.style.textShadow = "0 0 25px #ff99cc";

  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 800);

  launchFireworks();
  createRoses();
  poemEl.style.display = "block";
  if (userData && userData.giftLink) giftLinkEl.style.display = "inline-block";
}

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function launchFireworks() {
  let particles = [];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      angle: Math.random() * 2 * Math.PI,
      speed: Math.random() * 6 + 2,
      life: 100
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.x += Math.cos(p.angle) * p.speed;
      p.y += Math.sin(p.angle) * p.speed;
      p.life--;

      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = "hsl(" + Math.random() * 360 + ",100%,60%)";
      ctx.fill();
    });

    particles = particles.filter(p => p.life > 0);

    if (particles.length > 0) {
      requestAnimationFrame(animate);
    }
  }

  animate();
}

function createRoses() {
  for (let i = 0; i < 10; i++) {
    let rose = document.createElement("div");
    rose.className = "rose";
    rose.innerText = "🌹";
    rose.style.left = Math.random() * 100 + "vw";
    rose.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(rose);
  }
}
</script>

</body>
</html>
