<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SBU2 Amazing</title>
<style>
body {
  margin: 0;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe6f0, #ffd6eb);
  color: #d63384; /* hồng đậm để đọc rõ hơn */
  overflow: hidden;
}

.container {
  margin-top: 100px;
}

h1 {
  font-size: 48px;
  color: #d63384;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 30px #ff2f92; }
}

#money {
  font-size: 90px;
  margin: 40px;
  font-weight: bold;
}

button {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: radial-gradient(circle, #ff4da6, #d63384);
  color: white;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(214,51,132,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 15px 35px rgba(214,51,132,0.6);
}

button:active {
  transform: scale(0.95);
}

button:disabled {
  background: #ccc;
  box-shadow: none;
  cursor: not-allowed;
}

.shake {
  animation: shake 0.8s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-8px,4px); }
  50% { transform: translate(8px,-4px); }
  75% { transform: translate(-8px,4px); }
  100% { transform: translate(0,0); }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

.rose {
  position: fixed;
  font-size: 40px;
  animation: float 8s linear infinite;
  opacity: 0.8;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

.poem {
  margin-top: 30px;
  font-size: 20px;
  line-height: 1.8;
  display: none;
  color: #6a0572; /* tím đậm dễ đọc */
  font-weight: 600;
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="container">
  <h1>🌸 SBU2 Amazing 🌸</h1>
  <div id="money">0円</div>
  <button id="spinBtn" onclick="startSpin()">SPIN</button>  

  <div class="poem" id="poem">
    🌹<br>
    Diệp vào phòng sáng lung linh,<br>
    Đồng nghiệp nhìn thấy tinh thần tăng ngay.<br>
    Tám ba chúc Diệp hôm nay,<br>
    Sếp quên giao việc, cả ngày đi chơi!
  </div>
</div>

<script>
const FINAL_AMOUNT = 3000;
const MAX_AMOUNT = 10000;

const btn = document.getElementById("spinBtn");
const display = document.getElementById("money");
const poem = document.getElementById("poem");

if (localStorage.getItem("gift_used")) {
  btn.disabled = true;
  display.innerText = FINAL_AMOUNT.toLocaleString() + "円";
  poem.style.display = "block";
}

function startSpin() {
  btn.disabled = true;
  localStorage.setItem("gift_used", "true");

  let current = 0;

  // Phase 1: tăng nhanh
  const up = setInterval(() => {
    current += Math.floor(Math.random() * 900) + 400;
    if (current >= MAX_AMOUNT) {
       clearInterval(up);
       setTimeout(randomFinalPhase, 1000); // treo 1 giây ở 10,000
    }
    display.innerText = Math.min(current, MAX_AMOUNT).toLocaleString() + "円";
  }, 100);
}

// Phase 2: nhảy loạn 1000-10000
function randomFinalPhase() {
  let duration = 5000;
  let start = Date.now();

  const chaos = setInterval(() => {
    let randomValue = Math.floor(Math.random() * 9000) + 1000;
    display.innerText = randomValue.toLocaleString() + "円";

    if (Date.now() - start > duration) {
      clearInterval(chaos);
      finish();
    }
  }, 80);
}

function finish() {
  display.innerText = FINAL_AMOUNT.toLocaleString() + "円";
  display.style.color = "#d63384";
  display.style.textShadow = "0 0 25px #ff99cc";

  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 800);

  launchFireworks();
  createRoses();
  poem.style.display = "block";
}

/* Fireworks */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function launchFireworks() {
  let particles = [];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      angle: Math.random() * 2 * Math.PI,
      speed: Math.random() * 6 + 2,
      life: 100
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.x += Math.cos(p.angle) * p.speed;
      p.y += Math.sin(p.angle) * p.speed;
      p.life--;

      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = "hsl(" + Math.random() * 360 + ",100%,60%)";
      ctx.fill();
    });

    particles = particles.filter(p => p.life > 0);

    if (particles.length > 0) {
      requestAnimationFrame(animate);
    }
  }

  animate();
}

/* Floating roses */
function createRoses() {
  for (let i = 0; i < 10; i++) {
    let rose = document.createElement("div");
    rose.className = "rose";
    rose.innerText = "🌹";
    rose.style.left = Math.random() * 100 + "vw";
    rose.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(rose);
  }
}
</script>

</body>
</html>
