<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SBU2 Amazing</title>
<style>
body {
  margin: 0;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe6f0, #ffd6eb);
  color: #d63384; /* hồng đậm để đọc rõ hơn */
  overflow: hidden;
}

.container {
  margin-top: 100px;
}

h1 {
  font-size: 48px;
  color: #d63384;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 30px #ff2f92; }
}

#money {
  font-size: 90px;
  margin: 40px;
  font-weight: bold;
}

button {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  background: radial-gradient(circle, #ff4da6, #d63384);
  color: white;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(214,51,132,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 15px 35px rgba(214,51,132,0.6);
}

button:active {
  transform: scale(0.95);
}

button:disabled {
  background: #ccc;
  box-shadow: none;
  cursor: not-allowed;
}

.shake {
  animation: shake 0.8s;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(-8px,4px); }
  50% { transform: translate(8px,-4px); }
  75% { transform: translate(-8px,4px); }
  100% { transform: translate(0,0); }
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

.rose {
  position: fixed;
  font-size: 40px;
  animation: float 8s linear infinite;
  opacity: 0.8;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

.poem {
  margin-top: 30px;
  font-size: 20px;
  line-height: 1.8;
  display: none;
  color: #6a0572;
  font-weight: 600;
}

#subtitle {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.65);
  color: #fff;
  font-size: 22px;
  font-weight: 600;
  padding: 10px 30px;
  border-radius: 12px;
  max-width: 80%;
  text-align: center;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
  z-index: 100;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

#subtitle.visible {
  opacity: 1;
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div class="container">
  <h1>🌸 SBU2 Amazing 🌸</h1>
  <div id="money">0円</div>
  <p id="headphoneHint" style="font-size:16px; color:#d63384; margin-bottom:10px;">🎧 Đeo tai nghe để trải nghiệm tốt nhất!</p>
  <button id="spinBtn" onclick="startSpin()">🎵<br>SPIN</button>  

  <div class="poem" id="poem"></div>
</div>

<div id="subtitle"></div>

<script>
const USERS = {
  diep: {
    name: "Diệp",
    amount: 3000,
    music: "diep.mp3",
    subtitles: [
      { time: 0, text: "♪ ..." },
      { time: 5, text: "Lời bài hát dòng 1..." },
      { time: 10, text: "Lời bài hát dòng 2..." },
      { time: 15, text: "" }
    ],
    poem: `🌹<br>
    Diệp vào phòng sáng lung linh,<br>
    Đồng nghiệp nhìn thấy tinh thần tăng ngay.<br>
    Tám ba chúc Diệp hôm nay,<br>
    Sếp quên giao việc, cả ngày đi chơi!`
  },
  thu: {
    name: "Thư",
    amount: 3000,
    music: "thu.mp3",
    subtitles: [
      { time: 0, text: "♪ ..." },
      { time: 5, text: "Lời bài hát dòng 1..." },
      { time: 10, text: "Lời bài hát dòng 2..." },
      { time: 15, text: "" }
    ],
    poem: `🌹<br>
    Thư làm chẳng thấy kêu ca,<br>
    Deadline dí tới vẫn cười HAHA.<br>
    Ngày tám tháng ba thật gần,<br>
    Chúc Thư luôn đẹp, luôn xuân trong lòng.`
  },
  thanh: {
    name: "Thanh",
    amount: 3000,
    music: "thanh.mp3",
    subtitles: [
      { time: 0, text: "♪ ..." },
      { time: 5, text: "Lời bài hát dòng 1..." },
      { time: 10, text: "Lời bài hát dòng 2..." },
      { time: 15, text: "" }
    ],
    poem: `🌹<br>
    Thanh như gió mát đầu ngày,<br>
    Mang theo vui vẻ đong đầy quanh ta.<br>
    Mùng tám tháng ba đến nha,<br>
    Chúc Thanh rạng rỡ như hoa giữa trời.`
  }
};

const params = new URLSearchParams(window.location.search);
const userKey = (params.get("user") || "").toLowerCase();
const userData = USERS[userKey];

if (!userData) {
  document.querySelector(".container").innerHTML = "<h1>🌸 SBU2 Amazing 🌸</h1><p style='font-size:24px'>Không tìm thấy người nhận.<br>Vui lòng kiểm tra lại link.</p>";
}

const FINAL_AMOUNT = userData ? userData.amount : 0;
const MAX_AMOUNT = 10000;

const btn = document.getElementById("spinBtn");
const display = document.getElementById("money");
const poemEl = document.getElementById("poem");

if (userData) {
  poemEl.innerHTML = userData.poem;
  const storageKey = "gift_used_" + userKey;

  if (localStorage.getItem(storageKey)) {
    btn.disabled = true;
    display.innerText = FINAL_AMOUNT.toLocaleString() + "円";
    poemEl.style.display = "block";
  }
}

let audio = null;
const subtitleEl = document.getElementById("subtitle");

function startSubtitles() {
  if (!audio || !userData || !userData.subtitles) return;
  const subs = userData.subtitles;

  audio.addEventListener("timeupdate", () => {
    const t = audio.currentTime;
    let current = "";
    for (let i = subs.length - 1; i >= 0; i--) {
      if (t >= subs[i].time) {
        current = subs[i].text;
        break;
      }
    }
    if (current) {
      subtitleEl.textContent = current;
      subtitleEl.classList.add("visible");
    } else {
      subtitleEl.classList.remove("visible");
    }
  });

  audio.addEventListener("ended", () => {
    subtitleEl.classList.remove("visible");
  });
}

function startSpin() {
  btn.disabled = true;
  const storageKey = "gift_used_" + userKey;
  localStorage.setItem(storageKey, "true");

  if (userData && userData.music) {
    audio = new Audio(userData.music);
    audio.play().catch(() => {});
    startSubtitles();
  }

  let current = 0;

  // Phase 1: tăng nhanh
  const up = setInterval(() => {
    current += Math.floor(Math.random() * 900) + 400;
    if (current >= MAX_AMOUNT) {
       clearInterval(up);
       setTimeout(randomFinalPhase, 1000); // treo 1 giây ở 10,000
    }
    display.innerText = Math.min(current, MAX_AMOUNT).toLocaleString() + "円";
  }, 100);
}

// Phase 2: nhảy loạn 1000-10000
function randomFinalPhase() {
  let duration = 5000;
  let start = Date.now();

  const chaos = setInterval(() => {
    let randomValue = Math.floor(Math.random() * 9000) + 1000;
    display.innerText = randomValue.toLocaleString() + "円";

    if (Date.now() - start > duration) {
      clearInterval(chaos);
      finish();
    }
  }, 80);
}

function finish() {
  display.innerText = FINAL_AMOUNT.toLocaleString() + "円";
  display.style.color = "#d63384";
  display.style.textShadow = "0 0 25px #ff99cc";

  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 800);

  launchFireworks();
  createRoses();
  poemEl.style.display = "block";
}

/* Fireworks */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function launchFireworks() {
  let particles = [];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: canvas.width / 2,
      y: canvas.height / 2,
      angle: Math.random() * 2 * Math.PI,
      speed: Math.random() * 6 + 2,
      life: 100
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.x += Math.cos(p.angle) * p.speed;
      p.y += Math.sin(p.angle) * p.speed;
      p.life--;

      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = "hsl(" + Math.random() * 360 + ",100%,60%)";
      ctx.fill();
    });

    particles = particles.filter(p => p.life > 0);

    if (particles.length > 0) {
      requestAnimationFrame(animate);
    }
  }

  animate();
}

/* Floating roses */
function createRoses() {
  for (let i = 0; i < 10; i++) {
    let rose = document.createElement("div");
    rose.className = "rose";
    rose.innerText = "🌹";
    rose.style.left = Math.random() * 100 + "vw";
    rose.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(rose);
  }
}
</script>

</body>
</html>
